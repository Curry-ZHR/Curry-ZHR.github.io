<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Homepage</title>
  <meta name="description" content="Academic personal homepage">
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">
  <link rel="stylesheet" href="/css/index.css">
</head>
<body>
  <div class="page-shell">
    <aside class="profile-panel" aria-label="Profile">
      <div class="profile-avatar-wrap">
        <img id="profile-avatar" class="profile-avatar" src="" alt="Profile avatar">
      </div>
      <h1 id="profile-name" class="profile-name"></h1>
      <p id="profile-org" class="profile-org"></p>
      <p id="profile-lab" class="profile-lab"></p>
      <ul id="profile-links" class="profile-links"></ul>
    </aside>

    <main class="content-panel">
      <nav class="section-nav" aria-label="Section navigation">
        <a href="#about">About Me</a>
        <a href="#news">News</a>
        <a href="#publications">Publications</a>
        <a href="#awards">Honors and Awards</a>
        <a href="#educations">Educations</a>
        <a href="#talks">Invited Talks</a>
        <a href="#internships">Internships</a>
      </nav>

      <section id="about" class="section-block">
        <h2>About Me</h2>
        <div id="about-content"></div>
      </section>

      <section id="news" class="section-block">
        <h2>News</h2>
        <ul id="news-list" class="timeline-list"></ul>
      </section>

      <section id="publications" class="section-block">
        <h2>Publications</h2>
        <ul id="publications-list" class="item-list"></ul>
      </section>

      <section id="awards" class="section-block">
        <h2>Honors and Awards</h2>
        <ul id="awards-list" class="item-list"></ul>
      </section>

      <section id="educations" class="section-block">
        <h2>Educations</h2>
        <ul id="educations-list" class="item-list"></ul>
      </section>

      <section id="talks" class="section-block">
        <h2>Invited Talks</h2>
        <ul id="talks-list" class="item-list"></ul>
      </section>

      <section id="internships" class="section-block">
        <h2>Internships</h2>
        <ul id="internships-list" class="item-list"></ul>
      </section>
    </main>
  </div>

  <script src="/js/site-data.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
